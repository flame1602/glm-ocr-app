name: Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: asia-southeast1
  SERVICE_NAME: glm-ocr-app

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Build and Push Image
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/glm-ocr/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          docker build -t $IMAGE .
          docker push $IMAGE
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.IMAGE }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --memory 2Gi \
            --cpu 2 \
            --timeout 3600 \
            --max-instances 3 \
            --set-env-vars "ZHIPU_API_KEY=${{ secrets.ZHIPU_API_KEY }}" \
            --set-env-vars "APP_PASSWORD=${{ secrets.APP_PASSWORD }}" \
            --set-env-vars "GOOGLE_DRIVE_ENABLED=${{ secrets.GOOGLE_DRIVE_ENABLED }}" \
            --set-env-vars "DRIVE_INPUT_FOLDER_ID=${{ secrets.DRIVE_INPUT_FOLDER_ID }}" \
            --set-env-vars "DRIVE_OUTPUT_FOLDER_ID=${{ secrets.DRIVE_OUTPUT_FOLDER_ID }}" \
            --set-env-vars "DRIVE_CREDENTIALS_JSON=${{ secrets.DRIVE_CREDENTIALS_JSON }}"

      - name: Show URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} --region ${{ env.REGION }} --format 'value(status.url)')
          echo "🌐 Deployed to: $URL"
